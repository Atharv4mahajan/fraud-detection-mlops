name: build-and-deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REPO }}

      - name: Build Docker Image
        run: |
          docker build -t fraud-mlops-app .

      - name: Tag Docker Image
        run: |
          docker tag fraud-mlops-app:latest ${{ secrets.ECR_REPO }}:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.ECR_REPO }}:latest

      - name: Stop Existing Container
        run: |
          docker stop fraud-container || true
          docker rm fraud-container || true

      - name: Run Docker Container
        run: |
          docker run -d -p 5080:5080 --name fraud-container ${{ secrets.ECR_REPO }}:latest